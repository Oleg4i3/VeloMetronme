name: Build VeloMetronome APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova and ImageMagick
        run: |
          npm install -g cordova
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Create Cordova Project
        run: |
          cordova create metronome com.velo.metronome VeloMetronome
          cd metronome
          cordova platform add android
          
          # Устанавливаем нужные плагины
          cordova plugin add cordova-plugin-vibration
          cordova plugin add cordova-plugin-background-mode

      - name: Generate App Icon
        run: |
          mkdir -p metronome/res/icon/android
          
          # Создаем иконку через ImageMagick
          convert -size 512x512 xc:'#1a1a2e' \
            -fill '#e94560' -draw "circle 256,200 256,100" \
            -fill '#0f3460' -draw "circle 256,350 256,280" \
            -fill '#16213e' -draw "rectangle 240,100 272,400" \
            -fill '#e94560' -draw "polygon 200,350 256,280 312,350" \
            -fill 'white' -font Helvetica-Bold -pointsize 120 -gravity center -annotate +0-30 "VM" \
            -fill '#e94560' -draw "circle 220,200 220,185" \
            -fill '#e94560' -draw "circle 292,200 292,185" \
            metronome/res/icon/android/icon.png
          
          cp metronome/res/icon/android/icon.png metronome/www/icon.png

      - name: Configure config.xml
        run: |
          cat << 'EOF' > metronome/config.xml
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.velo.metronome" version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
              <name>VeloMetronome</name>
              <description>Bicycle Cadence Metronome</description>
              <author email="dev@example.com">Developer</author>
              <content src="index.html" />
              <access origin="*" />
              <allow-intent href="http://*/*" />
              <allow-intent href="https://*/*" />
              <preference name="Orientation" value="portrait" />
              <preference name="KeepRunning" value="true" />
              <icon src="www/icon.png" />
          </widget>
          EOF

      - name: Write Application Source
        run: |
          cat << 'EOF' > metronome/www/index.html
          <!doctype html>
          <html>
          <head>
          <meta charset="utf-8">
          <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com 'unsafe-eval' 'unsafe-inline' blob:; media-src * data:; img-src 'self' data: content:;">
          <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
          <title>VeloMetronome</title>
          <style>
          body {
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            text-align: center;
            min-height: 100vh;
            margin: 0;
          }
          .container {
            max-width: 400px;
            margin: 0 auto;
          }
          h2 {
            color: #e94560;
            margin-bottom: 30px;
          }
          .bpm-display {
            font-size: 72px;
            font-weight: bold;
            color: #e94560;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
          }
          input[type=range] {
            width: 100%;
            height: 40px;
            margin: 20px 0;
            appearance: none;
            background: #0f3460;
            border-radius: 20px;
            outline: none;
          }
          input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 50px;
            height: 50px;
            background: #e94560;
            border-radius: 50%;
            cursor: pointer;
          }
          button {
            width: 100%;
            padding: 20px;
            font-size: 24px;
            margin: 10px 0;
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            transition: all 0.3s;
          }
          #start {
            background: linear-gradient(135deg, #1a4d1a, #2d8a2d);
          }
          #stop {
            background: linear-gradient(135deg, #4d1a1a, #8a2d2d);
          }
          .checkbox-container {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
          }
          .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
          }
          input[type=checkbox] {
            width: 24px;
            height: 24px;
            accent-color: #e94560;
          }
          .status {
            font-size: 14px;
            color: #888;
            margin-top: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
          }
          label {
            font-size: 16px;
          }
          </style>
          </head>
          <body>
          <div class="container">
            <h2>🚴 VeloMetronome</h2>
            <div class="bpm-display" id="bpmVal">90</div>
            <div style="color: #888; margin-bottom: 10px;">BPM</div>
            <input id="bpm" type="range" min="40" max="180" value="90">
            
            <div class="checkbox-container">
              <div class="checkbox-item">
                <input type="checkbox" id="vibrateWeak" checked>
                <label>Слабая доля</label>
              </div>
              <div class="checkbox-item">
                <input type="checkbox" id="vibrateStrong" checked>
                <label>Сильная доля</label>
              </div>
            </div>
            
            <button id="start">▶ START</button>
            <button id="stop">⏹ STOP</button>
            <div class="status">
              💡 Экран выключен – кнопки громкости = СТАРТ/СТОП
            </div>
          </div>
          
          <audio id="silentAudio" loop src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA"></audio>

          <script src="cordova.js"></script>
          <script>
          const workerCode = `
              let timer = null;
              self.onmessage = function(e) {
                  if (e.data === 'start') timer = setInterval(() => postMessage('tick'), 25);
                  else if (e.data === 'stop') clearInterval(timer);
              };
          `;
          const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
          const timerWorker = new Worker(URL.createObjectURL(workerBlob));

          document.addEventListener('deviceready', function() {
              let ctx, isRunning = false, beat = 0, nextTime = 0;

              const bpmSlider = document.getElementById("bpm");
              const bpmVal = document.getElementById("bpmVal");
              const silentAudio = document.getElementById("silentAudio");
              const vibrateWeakCheck = document.getElementById("vibrateWeak");
              const vibrateStrongCheck = document.getElementById("vibrateStrong");

              if (cordova.plugins.backgroundMode) {
                  cordova.plugins.backgroundMode.enable();
                  cordova.plugins.backgroundMode.setDefaults({ 
                      silent: true,
                      hidden: true
                  });
              }

              // Динамическое переключение режима кнопок громкости
              document.addEventListener('pause', function() {
                  // Экран выключен – перехватываем кнопки громкости
                  if (cordova.plugins.backgroundMode) {
                      cordova.plugins.backgroundMode.overrideVolumeButtons(true);
                  }
              }, false);

              document.addEventListener('resume', function() {
                  // Экран включен – возвращаем стандартное поведение
                  if (cordova.plugins.backgroundMode) {
                      cordova.plugins.backgroundMode.overrideVolumeButtons(false);
                  }
                  // Возобновляем аудиоконтекст, если был
                  if (ctx && ctx.state === 'suspended') ctx.resume();
              }, false);

              // Обработка нажатий громкости (сработает только когда перехват включен)
              document.addEventListener('volumeupbutton', function() {
                  toggle();
              }, false);
              
              document.addEventListener('volumedownbutton', function() {
                  toggle();
              }, false);

              bpmSlider.oninput = () => bpmVal.textContent = bpmSlider.value;

              function noiseBuffer(ctx, dur=0.06) {
                  const b = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
                  const d = b.getChannelData(0);
                  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2 - 1) * 0.7;
                  return b;
              }

              function playBeat(time, strong) {
                  const s = ctx.createBufferSource();
                  s.buffer = noiseBuffer(ctx, strong ? 0.08 : 0.05);
                  const f = ctx.createBiquadFilter();
                  f.type = "bandpass";
                  f.frequency.value = strong ? 2200 : 1200;
                  const g = ctx.createGain();
                  g.gain.value = strong ? 1.5 : 0.7;
                  s.connect(f); f.connect(g); g.connect(ctx.destination);
                  s.start(time);
              }

              timerWorker.onmessage = function() {
                  if (!isRunning) return;
                  const interval = 60 / parseInt(bpmSlider.value);
                  while (nextTime < ctx.currentTime + 0.1) {
                      beat++;
                      const isStrong = (beat % 2 === 1);
                      playBeat(nextTime, isStrong);
                      
                      // Вибрация с использованием плагина (гарантированно работает в фоне)
                      const shouldVibrate = (isStrong && vibrateStrongCheck.checked) || 
                                          (!isStrong && vibrateWeakCheck.checked);
                      
                      if (shouldVibrate) {
                          const delay = Math.max(0, (nextTime - ctx.currentTime) * 1000);
                          setTimeout(() => { 
                              if (window.navigator && window.navigator.notification && window.navigator.notification.vibrate) {
                                  window.navigator.notification.vibrate(50);
                              } else if (window.navigator && window.navigator.vibrate) {
                                  window.navigator.vibrate(50);
                              }
                          }, delay);
                      }
                      nextTime += interval;
                  }
              };

              function toggle() { isRunning ? stop() : start(); }

              function start() {
                  if (isRunning) return;
                  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
                  ctx.resume();
                  silentAudio.play().catch(()=>{});
                  isRunning = true; beat = 0; nextTime = ctx.currentTime + 0.05;
                  timerWorker.postMessage('start');
                  document.getElementById("start").style.opacity = "0.7";
                  document.getElementById("start").style.transform = "scale(0.95)";
              }

              function stop() {
                  isRunning = false;
                  timerWorker.postMessage('stop');
                  silentAudio.pause();
                  document.getElementById("start").style.opacity = "1";
                  document.getElementById("start").style.transform = "scale(1)";
              }

              document.getElementById("start").onclick = start;
              document.getElementById("stop").onclick = stop;
          }, false);
          </script>
          </body>
          </html>
          EOF

      - name: Build Android APK
        run: |
          cd metronome
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VeloMetronome-APK
          path: metronome/platforms/android/app/build/outputs/apk/debug/app-debug.apk

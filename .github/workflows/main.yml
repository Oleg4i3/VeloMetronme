name: Build VeloMetronome APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create metronome com.velo.metronome VeloMetronome
          cd metronome
          cordova platform add android
          
          # Плагины: вибрация, фоновый режим (для работы с выключенным экраном)
          cordova plugin add cordova-plugin-vibration
          cordova plugin add cordova-plugin-background-mode

      - name: Download Bicycle Wheel Icon
        run: |
          mkdir -p metronome/res/icon/android
          # Скачиваем стабильный PNG иконки велосипедного колеса
          curl -L -o metronome/res/icon/android/icon.png "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Bicycle_wheel_icon.svg/512px-Bicycle_wheel_icon.svg.png"
          cp metronome/res/icon/android/icon.png metronome/www/icon.png

      - name: Configure config.xml
        run: |
          cat << 'EOF' > metronome/config.xml
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.velo.metronome" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
            <name>VeloMetronome</name>
            <description>Bicycle Cadence Metronome</description>
            <author email="dev@velo.metronome" href="http://cordova.io">Developer</author>
            <content src="index.html" />
            <preference name="AndroidWindowSplashScreenAnimatedIcon" value="res/icon/android/icon.png" />
            <preference name="AndroidWindowSplashScreenBackground" value="#0D1117" />
            <preference name="DisallowOverscroll" value="true" />
            <preference name="Orientation" value="portrait" />
            <preference name="Fullscreen" value="false" />
            <platform name="android">
              <icon density="mdpi" src="res/icon/android/icon.png" />
              <icon density="hdpi" src="res/icon/android/icon.png" />
              <icon density="xhdpi" src="res/icon/android/icon.png" />
              <icon density="xxhdpi" src="res/icon/android/icon.png" />
              <icon density="xxxhdpi" src="res/icon/android/icon.png" />
            </platform>
          </widget>
          EOF

      - name: Write Application Source
        run: |
          cat << 'HTMLEOF' > metronome/www/index.html
          <!DOCTYPE html>
          <html lang="ru">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
            <title>VeloMetronome</title>
            <style>
              :root { --bg: #0D1117; --text: #E6EDF3; --accent: #58A6FF; --stop: #F85149; }
              body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
              h1 { margin: 0 0 10px; font-size: 28px; }
              #bpm-display { font-size: 48px; font-weight: 800; color: var(--accent); margin: 10px 0; }
              input[type="range"] { width: 100%; max-width: 300px; height: 8px; accent-color: var(--accent); }
              button { background: var(--accent); color: #000; border: none; padding: 16px 40px; font-size: 22px; font-weight: bold; border-radius: 12px; margin: 20px 0; cursor: pointer; width: 100%; max-width: 300px; }
              button.stop { background: var(--stop); color: #fff; }
              .vib-controls { margin: 15px 0; text-align: left; width: 100%; max-width: 300px; }
              label { display: flex; align-items: center; gap: 10px; font-size: 16px; margin: 8px 0; cursor: pointer; }
              input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent); }
              .hint { color: #8B949E; font-size: 12px; text-align: center; margin-top: 20px; line-height: 1.4; }
            </style>
          </head>
          <body>
            <h1>🚲 VeloMetronome</h1>
            <div id="bpm-display">90 BPM</div>
            <input type="range" id="bpm-slider" min="40" max="220" value="90" step="1">
            <button id="toggle-btn">START</button>
            
            <div class="vib-controls">
              <label><input type="checkbox" id="vib-strong" checked> Сильная доля (вибрация)</label>
              <label><input type="checkbox" id="vib-weak"> Слабая доля (вибрация)</label>
            </div>
            
            <div class="hint">🔊 Громкость: Старт/Стоп<br>(для работы при выключенном экране отключите оптимизацию батареи для приложения)</div>

            <script>
              let isPlaying = false, timer = null, beat = 0;
              const bpmSlider = document.getElementById('bpm-slider');
              const bpmDisplay = document.getElementById('bpm-display');
              const toggleBtn = document.getElementById('toggle-btn');
              const vibStrong = document.getElementById('vib-strong');
              const vibWeak = document.getElementById('vib-weak');
              const ctx = new (window.AudioContext || window.webkitAudioContext)();

              bpmSlider.addEventListener('input', () => {
                bpmDisplay.textContent = bpmSlider.value + ' BPM';
                if (isPlaying) {
                  clearInterval(timer);
                  const interval = 60000 / parseInt(bpmSlider.value);
                  timer = setInterval(tick, interval);
                }
              });

              function playBeep(isStrong) {
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.value = isStrong ? 1200 : 800;
                gain.gain.setValueAtTime(0.5, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.05);
              }

              function tick() {
                const isStrong = beat % 4 === 0; // Размер 4/4
                playBeep(isStrong);

                if (isStrong && vibStrong.checked) {
                  navigator.vibrate(65);
                } else if (!isStrong && vibWeak.checked) {
                  navigator.vibrate(25);
                }
                beat++;
              }

              function toggleMetronome() {
                if (isPlaying) {
                  clearInterval(timer);
                  isPlaying = false;
                  toggleBtn.textContent = 'START';
                  toggleBtn.classList.remove('stop');
                  navigator.vibrate(0);
                } else {
                  if (ctx.state === 'suspended') ctx.resume();
                  beat = 0;
                  isPlaying = true;
                  toggleBtn.textContent = 'STOP';
                  toggleBtn.classList.add('stop');
                  const interval = 60000 / parseInt(bpmSlider.value);
                  tick();
                  timer = setInterval(tick, interval);
                }
              }

              toggleBtn.addEventListener('click', toggleMetronome);

              // Инициализация Cordova
              document.addEventListener('deviceready', function() {
                // Фоновый режим для сохранения работы JS при выключенном экране
                if (cordova.plugins && cordova.plugins.backgroundMode) {
                  cordova.plugins.backgroundMode.setDefaults({
                    title: 'VeloMetronome',
                    text: 'Метроном активен...',
                    silent: true,
                    resume: true,
                    hidden: true
                  });
                  cordova.plugins.backgroundMode.enable();
                  cordova.plugins.backgroundMode.disableWebViewOptimizations();
                }

                // Слушатели кнопок громкости
                document.addEventListener('volumeupbutton', toggleMetronome, false);
                document.addEventListener('volumedownbutton', toggleMetronome, false);
              }, false);
            </script>
          </body>
          </html>
          HTMLEOF

      - name: Build Android APK
        run: |
          cd metronome
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VeloMetronome-APK
          path: metronome/platforms/android/app/build/outputs/apk/debug/app-debug.apk

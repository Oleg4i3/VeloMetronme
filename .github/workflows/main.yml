name: Build VeloMetronome APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create metronome com.velo.metronome VeloMetronome
          cd metronome
          cordova platform add android
          cordova plugin add cordova-plugin-vibration
          cordova plugin add cordova-plugin-background-mode

      - name: Setup Icon
        run: |
          mkdir -p metronome/res/icon/android
          # Качаем стандартную иконку, чтобы компилятор Android (AAPT2) не выдавал ошибок
          curl -L -o metronome/www/icon.png https://raw.githubusercontent.com/apache/cordova-app-hello-world/master/template_src/www/img/logo.png
          cp metronome/www/icon.png metronome/res/icon/android/icon.png

      - name: Configure config.xml
        run: |
          cat << 'EOF' > metronome/config.xml
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.velo.metronome" version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
              <name>VeloMetronome</name>
              <description>Bicycle Cadence Metronome</description>
              <content src="index.html" />
              <access origin="*" />
              <allow-intent href="http://*/*" />
              <allow-intent href="https://*/*" />
              <preference name="Orientation" value="portrait" />
              <preference name="KeepRunning" value="true" />
              <icon src="www/icon.png" />
          </widget>
          EOF

      - name: Write Application Source
        run: |
          cat << 'EOF' > metronome/www/index.html
          <!doctype html>
          <html>
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
          <title>VeloMetronome</title>
          <style>
          body { font-family: sans-serif; padding: 30px; background:#000; color:#fff; text-align:center; }
          button { width: 100%; padding: 25px; font-size: 24px; margin: 15px 0; border: none; border-radius: 10px; color: white; font-weight: bold; }
          #start { background: #28a745; }
          #stop { background: #dc3545; }
          input[type=range] { width: 100%; height: 60px; margin: 20px 0; }
          h2 { color: #f14f4d; margin-bottom: 0; }
          .bpm-display { font-size: 72px; font-weight: bold; margin: 10px 0; color: #f14f4d; }
          .hint { font-size: 14px; color: #666; margin-top: 20px; }
          </style>
          </head>
          <body>
          <h2>VeloMetronome</h2>
          <div class="bpm-display" id="bpmVal">90</div>
          <input id="bpm" type="range" min="40" max="180" value="90">
          <button id="start">START</button>
          <button id="stop">STOP</button>
          <div class="hint">В кармане: кнопка громкости = Вкл/Выкл</div>
          
          <audio id="silentAudio" loop src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA"></audio>

          <script src="cordova.js"></script>
          <script>
          // Высокоточный таймер в отдельном потоке
          const workerCode = `
              let timer = null;
              self.onmessage = function(e) {
                  if (e.data === 'start') timer = setInterval(() => postMessage('tick'), 25);
                  else if (e.data === 'stop') clearInterval(timer);
              };
          `;
          const timerWorker = new Worker(URL.createObjectURL(new Blob([workerCode])));

          document.addEventListener('deviceready', () => {
              let ctx, isRunning = false, beat = 0, nextTime = 0;
              let isScreenOff = false;

              const bpmSlider = document.getElementById("bpm");
              const bpmVal = document.getElementById("bpmVal");
              const silentAudio = document.getElementById("silentAudio");

              // Включаем фоновый режим
              cordova.plugins.backgroundMode.enable();
              cordova.plugins.backgroundMode.setDefaults({ silent: true });

              document.addEventListener('pause', () => { isScreenOff = true; }, false);
              document.addEventListener('resume', () => { isScreenOff = false; }, false);

              // УПРАВЛЕНИЕ ГРОМКОСТЬЮ ПРИ ВЫКЛЮЧЕННОМ ЭКРАНЕ
              const handleVolume = () => {
                  if (isScreenOff) { 
                      toggle(); 
                  }
              };
              document.addEventListener('volumeupbutton', handleVolume, false);
              document.addEventListener('volumedownbutton', handleVolume, false);

              bpmSlider.oninput = () => bpmVal.textContent = bpmSlider.value;

              function playSound(time, freq, vol) {
                  const osc = ctx.createOscillator();
                  const g = ctx.createGain();
                  osc.type = 'square';
                  osc.frequency.value = freq;
                  g.gain.setValueAtTime(vol, time);
                  g.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                  osc.connect(g); g.connect(ctx.destination);
                  osc.start(time); osc.stop(time + 0.1);
              }

              timerWorker.onmessage = () => {
                  if (!isRunning) return;
                  const interval = 60 / parseInt(bpmSlider.value);
                  while (nextTime < ctx.currentTime + 0.1) {
                      beat++;
                      const isStrong = (beat % 2 !== 0);
                      
                      // Звук: сильная доля выше, слабая ниже
                      playSound(nextTime, isStrong ? 1200 : 800, isStrong ? 0.5 : 0.3);

                      // 1) ВИБРО НА ВТОРУЮ (СЛАБУЮ) ДОЛЮ
                      if (!isStrong) {
                          const delay = Math.max(0, (nextTime - ctx.currentTime) * 1000);
                          setTimeout(() => {
                              if (navigator.vibrate) navigator.vibrate(60);
                          }, delay);
                      }
                      nextTime += interval;
                  }
              };

              function toggle() { isRunning ? stop() : start(); }

              function start() {
                  if (isRunning) return;
                  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
                  ctx.resume();
                  silentAudio.play().catch(() => {});
                  isRunning = true; beat = 0; nextTime = ctx.currentTime + 0.05;
                  timerWorker.postMessage('start');
                  document.getElementById("start").style.boxShadow = "0 0 20px white";
              }

              function stop() {
                  isRunning = false;
                  timerWorker.postMessage('stop');
                  silentAudio.pause();
                  document.getElementById("start").style.boxShadow = "none";
              }

              document.getElementById("start").onclick = start;
              document.getElementById("stop").onclick = stop;
          }, false);
          </script>
          </body>
          </html>
          EOF

      - name: Build Android APK
        run: |
          cd metronome
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VeloMetronome-APK
          path: metronome/platforms/android/app/build/outputs/apk/debug/app-debug.apk

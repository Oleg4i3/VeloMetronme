name: Build Metronome APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create metronome com.example.metronome Metronome
          cd metronome
          
          # Используем стабильные плагины для фоновой работы и вибрации
          cordova plugin add cordova-plugin-vibration
          cordova plugin add cordova-plugin-background-mode
          
          # Заменяем несуществующий плагин на нативную поддержку аппаратных кнопок через конфигурацию
          # В Cordova кнопки громкости перехватываются стандартными событиями window.addEventListener
          
          cat << 'EOF' > config.xml
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.example.metronome" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0" xmlns:android="http://schemas.android.com/apk/res/android">
              <name>Metronome</name>
              <content src="index.html" />
              <access origin="*" />
              <preference name="KeepRunning" value="true"/>
              <platform name="android">
                  <config-file target="AndroidManifest.xml" parent="/*">
                      <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
                      <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />
                      <uses-permission android:name="android.permission.WAKE_LOCK" />
                      <uses-permission android:name="android.permission.VIBRATE" />
                  </config-file>
              </platform>
          </widget>
          EOF
          
          cordova platform add android

      - name: Write Application Source
        run: |
          cat << 'EOF' > metronome/www/index.html
          <!doctype html>
          <html>
          <head>
          <meta charset="utf-8">
          <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com 'unsafe-eval' 'unsafe-inline'; media-src *; img-src 'self' data: content:;">
          <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
          <title>Metronome</title>
          <style>
          body { font-family: sans-serif; padding: 20px; background:#111; color:#eee; text-align: center; }
          button { font-size: 24px; margin: 10px; padding: 10px 20px; width: 80%; }
          input[type=range]{ width: 100%; height: 40px; }
          #bpmVal { font-weight: bold; font-size: 2em; color: #0f0; }
          </style>
          </head>
          <body>
          <h2>Metronome</h2>
          <div>BPM: <span id="bpmVal">90</span></div>
          <input id="bpm" type="range" min="40" max="200" value="90">
          <br>
          <button id="start">START</button>
          <button id="stop">STOP</button>
          
          <script src="cordova.js"></script>
          <script>
          document.addEventListener('deviceready', function() {
              let ctx;
              let isRunning = false;
              let beat = 0;
              let nextTime = 0;
              let lastClickTime = 0;

              // Настройка фонового режима
              if (window.cordova && cordova.plugins.backgroundMode) {
                  cordova.plugins.backgroundMode.enable();
                  cordova.plugins.backgroundMode.overrideBackButton();
                  cordova.plugins.backgroundMode.setDefaults({
                      title: 'Metronome',
                      text: 'Active in background',
                      icon: 'icon',
                      color: 'F1F1F1',
                      resume: true,
                      hidden: false,
                      bigText: true
                  });
              }

              // Перехват кнопок громкости
              function onVolumeButton() {
                  const now = Date.now();
                  if (now - lastClickTime < 500) {
                      if (isRunning) stop(); else start();
                  }
                  lastClickTime = now;
              }

              document.addEventListener("volumeupbutton", onVolumeButton, false);
              document.addEventListener("volumedownbutton", onVolumeButton, false);

              const bpmSlider = document.getElementById("bpm");
              const bpmVal = document.getElementById("bpmVal");

              bpmSlider.addEventListener("input", () => {
                  bpmVal.textContent = bpmSlider.value;
              });

              function noiseBuffer(ctx, duration=0.06) {
                  const rate = ctx.sampleRate;
                  const buffer = ctx.createBuffer(1, rate * duration, rate);
                  const data = buffer.getChannelData(0);
                  for (let i = 0; i < data.length; i++) {
                      data[i] = (Math.random()*2 - 1) * 0.8;
                  }
                  return buffer;
              }

              function playBeat(time, isStrong) {
                  const source = ctx.createBufferSource();
                  source.buffer = noiseBuffer(ctx, isStrong ? 0.09 : 0.05);

                  const filter = ctx.createBiquadFilter();
                  filter.type = "bandpass";
                  filter.frequency.value = isStrong ? 2200 : 1400;
                  filter.Q.value = 6;

                  const gain = ctx.createGain();
                  gain.gain.value = isStrong ? 1.5 : 0.8;

                  source.connect(filter);
                  filter.connect(gain);
                  gain.connect(ctx.destination);

                  source.start(time);
              }

              function scheduler() {
                  if (!isRunning) return;

                  const bpm = parseInt(bpmSlider.value);
                  const interval = 60 / bpm;

                  while (nextTime < ctx.currentTime + 0.1) {
                      beat++;
                      const isStrong = (beat % 2 === 1);
                      
                      playBeat(nextTime, isStrong);

                      // Вибрация на СЛАБУЮ долю (нечетные - сильные, четные - слабые)
                      if (!isStrong) {
                          const delay = Math.max(0, (nextTime - ctx.currentTime) * 1000);
                          setTimeout(() => {
                              if (navigator.vibrate) navigator.vibrate(40);
                          }, delay);
                      }

                      nextTime += interval;
                  }
                  requestAnimationFrame(scheduler);
              }

              function start() {
                  if (isRunning) return;
                  ctx = new (window.AudioContext || window.webkitAudioContext)();
                  isRunning = true;
                  beat = 0;
                  nextTime = ctx.currentTime + 0.05;
                  scheduler();
              }

              function stop() {
                  isRunning = false;
                  if (ctx) {
                      ctx.close();
                      ctx = null;
                  }
              }

              document.getElementById("start").onclick = start;
              document.getElementById("stop").onclick = stop;
          }, false);
          </script>
          </body>
          </html>
          EOF

      - name: Build Android APK
        run: |
          cd metronome
          cordova build android --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Metronome-APK
          path: metronome/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk

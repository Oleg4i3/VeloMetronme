name: Build Bicycle Metronome APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create Android Project
        run: |
          mkdir -p app/src/main/java/com/example/metronome
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          cat << 'EOF' > settings.gradle.kts
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "Bicycle Metronome"
          include(":app")
          EOF

          cat << 'EOF' > build.gradle.kts
          plugins {
              id("com.android.application") version "8.2.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
          }
          EOF

          cat << 'EOF' > app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          android {
              namespace = "com.example.metronome"
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.example.metronome"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              buildFeatures {
                  compose = true
              }
              composeOptions {
                  kotlinCompilerExtensionVersion = "1.5.8"
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_1_8
                  targetCompatibility = JavaVersion.VERSION_1_8
              }
              kotlinOptions {
                  jvmTarget = "1.8"
              }
          }
          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.7.0")
              implementation("androidx.activity:activity-compose:1.8.2")
              implementation(platform("androidx.compose:compose-bom:2024.02.00"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.material3:material3")
          }
          EOF

          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.VIBRATE"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <application
                  android:allowBackup="true"
                  android:label="Bicycle Metronome"
                  android:theme="@android:style/Theme.DeviceDefault.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service android:name=".MetronomeService" android:foregroundServiceType="mediaPlayback" android:exported="false"/>
              </application>
          </manifest>
          EOF

          cat << 'EOF' > app/src/main/java/com/example/metronome/MainActivity.kt
          package com.example.metronome

          import android.Manifest
          import android.content.Intent
          import android.os.Build
          import android.os.Bundle
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.compose.foundation.layout.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.unit.dp
          import androidx.core.app.ActivityCompat

          object MetronomeState {
              var isRunning by mutableStateOf(false)
              var bpm by mutableStateOf(90f)
              var soundEnabled by mutableStateOf(true)
              var vibroStrongEnabled by mutableStateOf(true)
              var vibroWeakEnabled by mutableStateOf(true)
          }

          class MainActivity : ComponentActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      ActivityCompat.requestPermissions(this, arrayOf(Manifest.permission.POST_NOTIFICATIONS), 1)
                  }
                  setContent {
                      MaterialTheme {
                          Surface(modifier = Modifier.fillMaxSize(), color = MaterialTheme.colorScheme.background) {
                              MetronomeScreen(
                                  onStartStop = {
                                      MetronomeState.isRunning = !MetronomeState.isRunning
                                      val intent = Intent(this, MetronomeService::class.java)
                                      if (MetronomeState.isRunning) {
                                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                                              startForegroundService(intent)
                                          } else {
                                              startService(intent)
                                          }
                                      } else {
                                          intent.action = "STOP"
                                          startService(intent)
                                      }
                                  }
                              )
                          }
                      }
                  }
              }
          }

          @Composable
          fun MetronomeScreen(onStartStop: () -> Unit) {
              Column(
                  modifier = Modifier.fillMaxSize().padding(16.dp),
                  horizontalAlignment = Alignment.CenterHorizontally,
                  verticalArrangement = Arrangement.Center
              ) {
                  Text(text = "Каденс: ${MetronomeState.bpm.toInt()} об/мин", style = MaterialTheme.typography.headlineMedium)
                  Slider(
                      value = MetronomeState.bpm,
                      onValueChange = { MetronomeState.bpm = it },
                      valueRange = 40f..180f,
                      modifier = Modifier.padding(vertical = 32.dp)
                  )
                  Row(verticalAlignment = Alignment.CenterVertically, modifier = Modifier.fillMaxWidth()) {
                      Checkbox(checked = MetronomeState.soundEnabled, onCheckedChange = { MetronomeState.soundEnabled = it })
                      Text("Звук (мягкий маракас)")
                  }
                  Row(verticalAlignment = Alignment.CenterVertically, modifier = Modifier.fillMaxWidth()) {
                      Checkbox(checked = MetronomeState.vibroStrongEnabled, onCheckedChange = { MetronomeState.vibroStrongEnabled = it })
                      Text("Вибрация (сильная доля)")
                  }
                  Row(verticalAlignment = Alignment.CenterVertically, modifier = Modifier.fillMaxWidth()) {
                      Checkbox(checked = MetronomeState.vibroWeakEnabled, onCheckedChange = { MetronomeState.vibroWeakEnabled = it })
                      Text("Вибрация (слабая доля)")
                  }
                  Spacer(modifier = Modifier.height(48.dp))
                  Button(onClick = onStartStop, modifier = Modifier.fillMaxWidth().height(60.dp)) {
                      Text(if (MetronomeState.isRunning) "СТОП" else "СТАРТ", style = MaterialTheme.typography.titleLarge)
                  }
              }
          }
          EOF

          cat << 'EOF' > app/src/main/java/com/example/metronome/MetronomeService.kt
          package com.example.metronome

          import android.app.*
          import android.content.Intent
          import android.media.*
          import android.os.*
          import androidx.core.app.NotificationCompat
          import kotlinx.coroutines.*

          class MetronomeService : Service() {
              private var wakeLock: PowerManager.WakeLock? = null
              private val job = SupervisorJob()
              private val scope = CoroutineScope(Dispatchers.Default + job)
              private lateinit var vibrator: Vibrator

              override fun onCreate() {
                  super.onCreate()
                  vibrator = getSystemService(VIBRATOR_SERVICE) as Vibrator
                  createNotificationChannel()
                  val powerManager = getSystemService(POWER_SERVICE) as PowerManager
                  wakeLock = powerManager.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK, "Metronome::Wakelock")
              }

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  if (intent?.action == "STOP") {
                      stopSelf()
                      return START_NOT_STICKY
                  }
                  val notification = NotificationCompat.Builder(this, "metronome_channel")
                      .setContentTitle("Велосипедный метроном")
                      .setContentText("Поддержание каденса...")
                      .setSmallIcon(android.R.drawable.ic_media_play)
                      .setPriority(NotificationCompat.PRIORITY_LOW)
                      .build()
                  startForeground(1, notification)
                  wakeLock?.acquire()
                  startMetronomeLoop()
                  return START_STICKY
              }

              private fun startMetronomeLoop() {
                  scope.coroutineContext.cancelChildren()
                  scope.launch {
                      var isStrongBeat = true
                      while (isActive) {
                          if (!MetronomeState.isRunning) {
                              stopSelf()
                              break
                          }
                          val currentBpm = MetronomeState.bpm
                          val delayMs = (60000f / currentBpm).toLong()
                          if (isStrongBeat && MetronomeState.vibroStrongEnabled) {
                              vibrate(true)
                          } else if (!isStrongBeat && MetronomeState.vibroWeakEnabled) {
                              vibrate(false)
                          }
                          if (MetronomeState.soundEnabled) {
                              playSound()
                          }
                          isStrongBeat = !isStrongBeat
                          delay(delayMs)
                      }
                  }
              }

              private fun vibrate(strong: Boolean) {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val effect = if (strong) {
                          VibrationEffect.createOneShot(100, VibrationEffect.DEFAULT_AMPLITUDE)
                      } else {
                          VibrationEffect.createOneShot(40, 80)
                      }
                      vibrator.vibrate(effect)
                  } else {
                      @Suppress("DEPRECATION")
                      vibrator.vibrate(if (strong) 100L else 40L)
                  }
              }

              private fun playSound() {
                  val sampleRate = 44100
                  val durationMs = 180
                  val numSamples = (sampleRate * durationMs / 1000.0).toInt()
                  val audioData = ShortArray(numSamples)
                  val frequency = 120.0 
                  for (i in 0 until numSamples) {
                      val t = i.toDouble() / sampleRate
                      val sine = kotlin.math.sin(2.0 * Math.PI * frequency * t).toFloat()
                      val noise = (kotlin.random.Random.nextFloat() * 2f - 1f) * 0.25f
                      val combined = sine + noise
                      val env = if (i < numSamples * 0.35) {
                          i.toFloat() / (numSamples * 0.35f)
                      } else {
                          1.0f - (i - numSamples * 0.35f) / (numSamples * 0.65f)
                      }
                      audioData[i] = (combined * env * Short.MAX_VALUE * 0.9f).toInt().toShort()
                  }
                  val track = AudioTrack.Builder()
                      .setAudioAttributes(AudioAttributes.Builder().setUsage(AudioAttributes.USAGE_MEDIA).setContentType(AudioAttributes.CONTENT_TYPE_SONIFICATION).build())
                      .setAudioFormat(AudioFormat.Builder().setEncoding(AudioFormat.ENCODING_PCM_16BIT).setSampleRate(sampleRate).setChannelMask(AudioFormat.CHANNEL_OUT_MONO).build())
                      .setBufferSizeInBytes(audioData.size * 2)
                      .setTransferMode(AudioTrack.MODE_STATIC)
                      .build()
                  track.write(audioData, 0, audioData.size)
                  track.play()
                  scope.launch {
                      delay(durationMs.toLong() + 50)
                      track.release()
                  }
              }

              private fun createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val channel = NotificationChannel("metronome_channel", "Metronome", NotificationManager.IMPORTANCE_LOW)
                      val manager = getSystemService(NotificationManager::class.java)
                      manager.createNotificationChannel(channel)
                  }
              }

              override fun onDestroy() {
                  super.onDestroy()
                  job.cancel()
                  wakeLock?.takeIf { it.isHeld }?.release()
              }

              override fun onBind(intent: Intent?): IBinder? = null
          }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bicycle-metronome-apk
          path: app/build/outputs/apk/debug/app-debug.apk

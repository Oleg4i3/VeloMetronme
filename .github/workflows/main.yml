name: Build Native Metronome APK (Pro Version)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Create Native Android Project
        run: |
          mkdir -p app/src/main/java/com/example/metronome
          mkdir -p app/src/main/res/mipmap
          
          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          android.suppressUnsupportedCompileSdk=34
          EOF
          
          cat << 'EOF' > settings.gradle.kts
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "Metronome"
          include(":app")
          EOF

          cat << 'EOF' > build.gradle.kts
          plugins {
              id("com.android.application") version "8.1.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.0" apply false
          }
          EOF

          cat << 'EOF' > app/build.gradle.kts
          plugins { id("com.android.application"); id("org.jetbrains.kotlin.android") }
          android {
              namespace = "com.example.metronome"
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.example.metronome"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = 4
                  versionName = "1.3"
              }
              compileOptions { sourceCompatibility = JavaVersion.VERSION_17; targetCompatibility = JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = "17" }
          }
          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.media:media:1.6.0")
          }
          EOF

          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />
              
              <application android:label="Velo Maracas" android:icon="@mipmap/ic_launcher" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service android:name=".MetronomeService" android:exported="false" android:foregroundServiceType="mediaPlayback" />
              </application>
          </manifest>
          EOF

          cat << 'EOF' > app/src/main/java/com/example/metronome/MainActivity.kt
          package com.example.metronome

          import android.app.Activity
          import android.content.Intent
          import android.os.Bundle
          import android.widget.*
          import android.graphics.Color
          import android.view.Gravity

          object MetronomeState {
              var bpm = 90
              var vibStrong = false
              var vibWeak = true
              var isPlaying = false
              var uiCallback: (() -> Unit)? = null
          }

          class MainActivity : Activity() {
              private lateinit var startBtn: Button

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  val layout = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      setPadding(60, 100, 60, 60)
                      setBackgroundColor(Color.parseColor("#111111"))
                  }

                  val bpmText = TextView(this).apply {
                      text = "BPM: ${MetronomeState.bpm}"
                      textSize = 28f
                      setTextColor(Color.WHITE)
                      gravity = Gravity.CENTER
                      setPadding(0, 0, 0, 20)
                  }

                  val bpmSlider = SeekBar(this).apply {
                      max = 140 
                      progress = MetronomeState.bpm - 40
                      setPadding(0, 0, 0, 80)
                      setOnSeekBarChangeListener(object : SeekBar.OnSeekBarChangeListener {
                          override fun onProgressChanged(seekBar: SeekBar?, progress: Int, fromUser: Boolean) {
                              MetronomeState.bpm = progress + 40
                              bpmText.text = "BPM: ${MetronomeState.bpm}"
                          }
                          override fun onStartTrackingTouch(seekBar: SeekBar?) {}
                          override fun onStopTrackingTouch(seekBar: SeekBar?) {}
                      })
                  }

                  val vibStrongCb = CheckBox(this).apply {
                      text = "Вибро на сильную долю"
                      setTextColor(Color.WHITE)
                      textSize = 18f
                      isChecked = MetronomeState.vibStrong
                      setPadding(0, 0, 0, 30)
                      setOnCheckedChangeListener { _, isChecked -> MetronomeState.vibStrong = isChecked }
                  }

                  val vibWeakCb = CheckBox(this).apply {
                      text = "Вибро на слабую долю"
                      setTextColor(Color.WHITE)
                      textSize = 18f
                      isChecked = MetronomeState.vibWeak
                      setPadding(0, 0, 0, 80)
                      setOnCheckedChangeListener { _, isChecked -> MetronomeState.vibWeak = isChecked }
                  }

                  startBtn = Button(this).apply {
                      textSize = 24f
                      setPadding(0, 40, 0, 40)
                      setOnClickListener {
                          if (MetronomeState.isPlaying) {
                              startService(Intent(this@MainActivity, MetronomeService::class.java).setAction("STOP"))
                          } else {
                              startForegroundService(Intent(this@MainActivity, MetronomeService::class.java).setAction("START"))
                          }
                      }
                  }

                  layout.addView(bpmText)
                  layout.addView(bpmSlider)
                  layout.addView(vibStrongCb)
                  layout.addView(vibWeakCb)
                  layout.addView(startBtn)

                  setContentView(layout)

                  MetronomeState.uiCallback = { runOnUiThread { updateBtn() } }
                  updateBtn()
              }

              private fun updateBtn() {
                  startBtn.text = if (MetronomeState.isPlaying) "STOP" else "START"
                  startBtn.setBackgroundColor(if (MetronomeState.isPlaying) Color.parseColor("#882222") else Color.parseColor("#444444"))
              }

              override fun onDestroy() {
                  super.onDestroy()
                  MetronomeState.uiCallback = null
              }
          }
          EOF

          cat << 'EOF' > app/src/main/java/com/example/metronome/MetronomeService.kt
          package com.example.metronome

          import android.app.*
          import android.content.Intent
          import android.media.*
          import android.os.*
          import android.support.v4.media.session.MediaSessionCompat
          import android.support.v4.media.session.PlaybackStateCompat
          import kotlin.concurrent.thread

          class MetronomeService : Service() {
              private lateinit var audioStrong: AudioTrack
              private lateinit var audioWeak: AudioTrack
              private lateinit var wakeLock: PowerManager.WakeLock
              private lateinit var mediaSession: MediaSessionCompat
              private lateinit var vibrator: Vibrator
              private var loopThread: Thread? = null
              
              override fun onCreate() {
                  super.onCreate()
                  vibrator = getSystemService(VIBRATOR_SERVICE) as Vibrator
                  
                  val nm = getSystemService(NotificationManager::class.java)
                  nm.createNotificationChannel(NotificationChannel("m", "Metronome", NotificationManager.IMPORTANCE_LOW))
                  
                  val notification = Notification.Builder(this, "m")
                      .setContentTitle("Velo Maracas")
                      .setContentText("Use Media keys to toggle")
                      .setSmallIcon(android.R.drawable.ic_media_play)
                      .build()
                  
                  startForeground(1, notification)

                  val pm = getSystemService(POWER_SERVICE) as PowerManager
                  wakeLock = pm.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK, "Velo::Lock")

                  setupAudio()
                  setupMediaSession()
              }

              private fun createTrack(isStrong: Boolean): AudioTrack {
                  val sampleRate = 44100
                  val duration = 0.2
                  val numSamples = (duration * sampleRate).toInt()
                  val buffer = FloatArray(numSamples)
                  
                  var lastNoise = 0f
                  for (i in 0 until numSamples) {
                      val noise = (Math.random() * 2 - 1).toFloat()
                      val attackLimit = numSamples * 0.4 
                      val envelope = if (i < attackLimit) (i / attackLimit).toFloat() 
                                     else (1.0 - (i - attackLimit) / (numSamples - attackLimit)).toFloat()
                      
                      if (isStrong) {
                          // Яркий шум на 100% громкости
                          buffer[i] = noise * envelope * 1.0f
                      } else {
                          // Глухой шум (срезаем высокие частоты усреднением) на 50% громкости
                          val smoothed = (noise + lastNoise) / 2f
                          lastNoise = noise
                          buffer[i] = smoothed * envelope * 0.5f
                      }
                  }

                  val track = AudioTrack.Builder()
                      .setAudioAttributes(AudioAttributes.Builder()
                          .setUsage(AudioAttributes.USAGE_MEDIA) // ИСПОЛЬЗУЕМ КАНАЛ МЕДИА (НЕТ ВСПЫШКЕ!)
                          .setContentType(AudioAttributes.CONTENT_TYPE_SONIFICATION)
                          .build())
                      .setAudioFormat(AudioFormat.Builder()
                          .setEncoding(AudioFormat.ENCODING_PCM_FLOAT)
                          .setSampleRate(sampleRate)
                          .setChannelMask(AudioFormat.CHANNEL_OUT_MONO)
                          .build())
                      .setBufferSizeInBytes(buffer.size * 4)
                      .setTransferMode(AudioTrack.MODE_STATIC)
                      .build()
                  
                  track.write(buffer, 0, buffer.size, AudioTrack.WRITE_BLOCKING)
                  return track
              }

              private fun setupAudio() {
                  audioStrong = createTrack(true)
                  audioWeak = createTrack(false)
              }

              private fun setupMediaSession() {
                  mediaSession = MediaSessionCompat(this, "VeloMetronome")
                  mediaSession.setCallback(object : MediaSessionCompat.Callback() {
                      override fun onMediaButtonEvent(mediaButtonEvent: Intent): Boolean {
                          if (MetronomeState.isPlaying) stopSelf()
                          return true
                      }
                  })
                  
                  val state = PlaybackStateCompat.Builder()
                      .setActions(PlaybackStateCompat.ACTION_PLAY or PlaybackStateCompat.ACTION_STOP)
                      .setState(PlaybackStateCompat.STATE_PLAYING, 0, 1.0f)
                      .build()
                  
                  mediaSession.setPlaybackState(state)
                  mediaSession.isActive = true
              }

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  if (intent?.action == "STOP") {
                      stopSelf()
                      return START_NOT_STICKY
                  }
                  
                  if (!MetronomeState.isPlaying) {
                      MetronomeState.isPlaying = true
                      MetronomeState.uiCallback?.invoke()
                      wakeLock.acquire(2*60*60*1000L)
                      startLoop()
                  }
                  return START_STICKY
              }

              private fun startLoop() {
                  loopThread = thread {
                      var nextTime = System.currentTimeMillis()
                      var beat = 0
                      while (MetronomeState.isPlaying) {
                          beat++
                          val isStrong = beat % 2 == 1
                          
                          // Выбираем нужный трек в зависимости от доли
                          val trackToPlay = if (isStrong) audioStrong else audioWeak
                          trackToPlay.stop()
                          trackToPlay.reloadStaticData()
                          trackToPlay.play()

                          val shouldVibrate = (isStrong && MetronomeState.vibStrong) || (!isStrong && MetronomeState.vibWeak)
                          if (shouldVibrate) {
                              val duration = if (isStrong) 60L else 40L
                              val effect = VibrationEffect.createOneShot(duration, VibrationEffect.DEFAULT_AMPLITUDE)
                              // Вибрация тоже через канал MEDIA
                              val attr = AudioAttributes.Builder()
                                  .setUsage(AudioAttributes.USAGE_MEDIA) 
                                  .build()
                              try { vibrator.vibrate(effect, attr) } catch (e: Exception) {}
                          }

                          val interval = 60000L / MetronomeState.bpm
                          nextTime += interval
                          val sleep = nextTime - System.currentTimeMillis()
                          if (sleep > 0) Thread.sleep(sleep) else nextTime = System.currentTimeMillis()
                      }
                  }
              }

              override fun onDestroy() {
                  MetronomeState.isPlaying = false
                  MetronomeState.uiCallback?.invoke()
                  if (wakeLock.isHeld) wakeLock.release()
                  mediaSession.release()
                  audioStrong.release()
                  audioWeak.release()
                  super.onDestroy()
              }
              
              override fun onBind(intent: Intent?) = null
          }
          EOF

          curl -sL -o /tmp/ic.svg https://raw.githubusercontent.com/twitter/twemoji/master/assets/svg/1f6b2.svg
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 192 -h 192 /tmp/ic.svg -o app/src/main/res/mipmap/ic_launcher.png

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Velo-Maracas-Native
          path: app/build/outputs/apk/debug/app-debug.apk

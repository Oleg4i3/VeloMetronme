name: Build VeloMetronome APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create metronome com.velo.metronome VeloMetronome
          cd metronome
          cordova platform add android
          
          # Устанавливаем только проверенные плагины
          cordova plugin add cordova-plugin-vibration
          cordova plugin add cordova-plugin-background-mode

      - name: Create App Icon
        run: |
          # Создаем 100% валидный PNG через встроенный ImageMagick, чтобы AAPT2 не крашился
          convert -size 512x512 xc:"#f14f4d" -gravity center -pointsize 100 -fill white -annotate +0+0 "Velo" metronome/www/icon.png

      - name: Configure config.xml
        run: |
          cat << 'EOF' > metronome/config.xml
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.velo.metronome" version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
              <name>VeloMetronome</name>
              <description>Bicycle Cadence Metronome</description>
              <author email="dev@example.com">Developer</author>
              <content src="index.html" />
              <access origin="*" />
              <allow-intent href="http://*/*" />
              <allow-intent href="https://*/*" />
              <preference name="Orientation" value="portrait" />
              <preference name="KeepRunning" value="true" />
              <icon src="www/icon.png" />
          </widget>
          EOF

      - name: Write Application Source
        run: |
          cat << 'EOF' > metronome/www/index.html
          <!doctype html>
          <html>
          <head>
          <meta charset="utf-8">
          <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com 'unsafe-eval' 'unsafe-inline' blob:; media-src * data:; img-src 'self' data: content:;">
          <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
          <title>VeloMetronome</title>
          <style>
          body { font-family: sans-serif; padding: 30px; background:#000; color:#fff; text-align:center; }
          button { width: 100%; padding: 20px; font-size: 24px; margin: 10px 0; background: #333; color: white; border: 1px solid #555; }
          #start { background: #1a4d1a; }
          #stop { background: #4d1a1a; }
          input[type=range] { width: 100%; height: 50px; }
          h2 { color: #f14f4d; }
          .status { font-size: 14px; color: #888; margin-top: 20px; }
          </style>
          </head>
          <body>
          <h2>VeloMetronome</h2>
          <div style="font-size: 48px;" id="bpmVal">90</div>
          <input id="bpm" type="range" min="40" max="180" value="90">
          <button id="start">START</button>
          <button id="stop">STOP</button>
          <div class="status">Кнопки громкости: Toggle (экран выкл)</div>
          
          <audio id="silentAudio" loop src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA"></audio>

          <script src="cordova.js"></script>
          <script>
          const workerCode = `
              let timer = null;
              self.onmessage = function(e) {
                  if (e.data === 'start') timer = setInterval(() => postMessage('tick'), 25);
                  else if (e.data === 'stop') clearInterval(timer);
              };
          `;
          const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
          const timerWorker = new Worker(URL.createObjectURL(workerBlob));

          document.addEventListener('deviceready', function() {
              let ctx, isRunning = false, beat = 0, nextTime = 0, lastVolTime = 0;
              let isPaused = false; 

              const bpmSlider = document.getElementById("bpm");
              const bpmVal = document.getElementById("bpmVal");
              const silentAudio = document.getElementById("silentAudio");

              if (cordova.plugins.backgroundMode) {
                  cordova.plugins.backgroundMode.enable();
                  cordova.plugins.backgroundMode.setDefaults({ silent: true });
              }

              document.addEventListener('pause', () => { isPaused = true; }, false);
              document.addEventListener('resume', () => { 
                  isPaused = false; 
                  if (ctx && ctx.state === 'suspended') ctx.resume();
              }, false);

              function handleVolume(e) {
                  if (!isPaused) return; 
                  
                  const now = Date.now();
                  if (now - lastVolTime < 600) {
                      toggle();
                      lastVolTime = 0;
                  } else {
                      lastVolTime = now;
                  }
              }
              
              document.addEventListener('volumeupbutton', handleVolume, false);
              document.addEventListener('volumedownbutton', handleVolume, false);

              bpmSlider.oninput = () => bpmVal.textContent = bpmSlider.value;

              function noiseBuffer(ctx, dur=0.06) {
                  const b = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
                  const d = b.getChannelData(0);
                  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2 - 1) * 0.7;
                  return b;
              }

              function playBeat(time, strong) {
                  const s = ctx.createBufferSource();
                  s.buffer = noiseBuffer(ctx, strong ? 0.08 : 0.05);
                  const f = ctx.createBiquadFilter();
                  f.type = "bandpass";
                  f.frequency.value = strong ? 2200 : 1200;
                  const g = ctx.createGain();
                  g.gain.value = strong ? 1.5 : 0.7;
                  s.connect(f); f.connect(g); g.connect(ctx.destination);
                  s.start(time);
              }

              timerWorker.onmessage = function() {
                  if (!isRunning) return;
                  const interval = 60 / parseInt(bpmSlider.value);
                  while (nextTime < ctx.currentTime + 0.1) {
                      beat++;
                      const isStrong = (beat % 2 === 1);
                      playBeat(nextTime, isStrong);
                      
                      if (!isStrong) {
                          const delay = Math.max(0, (nextTime - ctx.currentTime) * 1000);
                          setTimeout(() => { 
                              if(navigator.vibrate) navigator.vibrate(50); 
                          }, delay);
                      }
                      nextTime += interval;
                  }
              };

              function toggle() { isRunning ? stop() : start(); }

              function start() {
                  if (isRunning) return;
                  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
                  ctx.resume();
                  silentAudio.play().catch(()=>{});
                  isRunning = true; beat = 0; nextTime = ctx.currentTime + 0.05;
                  timerWorker.postMessage('start');
                  document.getElementById("start").style.border = "4px solid white";
              }

              function stop() {
                  isRunning = false;
                  timerWorker.postMessage('stop');
                  silentAudio.pause();
                  document.getElementById("start").style.border = "1px solid #555";
              }

              document.getElementById("start").onclick = start;
              document.getElementById("stop").onclick = stop;
          }, false);
          </script>
          </body>
          </html>
          EOF

      - name: Build Android APK
        run: |
          cd metronome
          # Собираем дебаг-версию, чтобы её можно было сразу установить без подписи релизным ключом
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VeloMetronome-APK
          path: metronome/platforms/android/app/build/outputs/apk/debug/app-debug.apk

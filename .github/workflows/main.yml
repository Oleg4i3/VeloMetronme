name: Build VeloMetronome APK (Capacitor)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Capacitor CLI and ImageMagick
        run: |
          npm install -g @capacitor/cli @capacitor/core
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Create Capacitor Project
        run: |
          mkdir velometronome && cd velometronome
          npm init -y
          npm install @capacitor/core @capacitor/cli
          npx cap init VeloMetronome com.velo.metronome --web-dir www
          npm install @capacitor/android
          npx cap add android
          
          npm install @capacitor-community/volume-buttons
          npm install @capacitor/haptics

      - name: Generate App Icon
        run: |
          cd velometronome
          mkdir -p www
          convert -size 512x512 xc:'#1a1a2e' \
            -fill '#e94560' -draw "circle 256,200 256,100" \
            -fill '#0f3460' -draw "circle 256,350 256,280" \
            -fill '#16213e' -draw "rectangle 240,100 272,400" \
            -fill '#e94560' -draw "polygon 200,350 256,280 312,350" \
            -fill 'white' -font Helvetica-Bold -pointsize 120 -gravity center -annotate +0-30 "VM" \
            -fill '#e94560' -draw "circle 220,200 220,185" \
            -fill '#e94560' -draw "circle 292,200 292,185" \
            www/icon.png

      - name: Write Application Web Content
        run: |
          cd velometronome
          cat << 'EOF' > www/index.html
          <!doctype html>
          <html>
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
          <title>VeloMetronome</title>
          <style>
          * { box-sizing: border-box; }
          body {
            font-family: sans-serif; padding:20px; background:#121212; color:#fff;
            text-align:center; min-height:100vh; margin:0; display:flex; align-items:center; justify-content:center;
          }
          .container { width:100%; max-width:400px; }
          h2 { color:#ff6b6b; margin-bottom:20px; }
          .bpm-display { font-size:80px; font-weight:bold; color:#ff6b6b; margin:10px 0; text-shadow:0 0 20px rgba(255,107,107,0.5); }
          input[type=range] { width:100%; height:40px; margin:15px 0; accent-color:#ff6b6b; }
          button { width:100%; padding:18px; font-size:22px; margin:8px 0; border:none; border-radius:12px; font-weight:bold; color:white; }
          #start { background:#2ecc71; }
          #stop { background:#e74c3c; }
          .checkbox-container { display:flex; justify-content:space-around; margin:15px 0; padding:12px; background:rgba(255,255,255,0.08); border-radius:12px; }
          .checkbox-item { display:flex; align-items:center; gap:8px; }
          input[type=checkbox] { width:20px; height:20px; accent-color:#ff6b6b; }
          .status { font-size:14px; color:#aaa; margin-top:15px; padding:8px; background:rgba(255,255,255,0.05); border-radius:8px; }
          </style>
          </head>
          <body>
          <div class="container">
            <h2>⏱ VeloMetronome</h2>
            <div class="bpm-display" id="bpmVal">90</div>
            <div style="color:#aaa;">BPM</div>
            <input id="bpm" type="range" min="40" max="180" value="90">
            <div class="checkbox-container">
              <div class="checkbox-item">
                <input type="checkbox" id="vibrateWeak" checked>
                <label>Слабая вибрация</label>
              </div>
              <div class="checkbox-item">
                <input type="checkbox" id="vibrateStrong" checked>
                <label>Сильная вибрация</label>
              </div>
            </div>
            <button id="start">▶ СТАРТ</button>
            <button id="stop">■ СТОП</button>
            <div class="status" id="modeStatus">
              🔔 Громкость: стандартный режим
            </div>
          </div>

          <script type="module">
          import { VolumeButtons } from '@capacitor-community/volume-buttons';
          import { Haptics, ImpactStyle } from '@capacitor/haptics';

          let ctx = null;
          let isRunning = false;
          let timer = null;
          let nextBeatTime = 0;
          let beatCount = 0;
          let isScreenOff = false;

          document.addEventListener('deviceready', () => {
            const bpmSlider = document.getElementById("bpm");
            const bpmVal = document.getElementById("bpmVal");
            const vibWeak = document.getElementById("vibrateWeak");
            const vibStrong = document.getElementById("vibrateStrong");
            const modeStatus = document.getElementById("modeStatus");

            bpmSlider.oninput = () => bpmVal.textContent = bpmSlider.value;

            VolumeButtons.addListener('volumeUpButton', () => {
              if (isScreenOff) toggle();
            });
            VolumeButtons.addListener('volumeDownButton', () => {
              if (isScreenOff) toggle();
            });

            document.addEventListener('pause', () => {
              isScreenOff = true;
              modeStatus.textContent = '🎧 Экран выкл: громкость → СТАРТ/СТОП';
            });
            document.addEventListener('resume', () => {
              isScreenOff = false;
              modeStatus.textContent = '🔔 Громкость: стандартный режим';
              if (ctx && ctx.state === 'suspended') ctx.resume();
            });

            function noiseBuffer(audioCtx, duration) {
              const length = audioCtx.sampleRate * duration;
              const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate);
              const data = buffer.getChannelData(0);
              for (let i = 0; i < length; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.6;
              }
              return buffer;
            }

            function playClick(time, strong) {
              const source = ctx.createBufferSource();
              source.buffer = noiseBuffer(ctx, strong ? 0.08 : 0.06);
              const filter = ctx.createBiquadFilter();
              filter.type = 'bandpass';
              filter.frequency.value = strong ? 2000 : 1000;
              const gain = ctx.createGain();
              gain.gain.value = strong ? 1.4 : 0.7;
              source.connect(filter);
              filter.connect(gain);
              gain.connect(ctx.destination);
              source.start(time);

              const doVib = (strong && vibStrong.checked) || (!strong && vibWeak.checked);
              if (doVib) {
                const delayMs = Math.max(0, (time - ctx.currentTime) * 1000);
                setTimeout(async () => {
                  try {
                    await Haptics.impact({ style: ImpactStyle.Medium });
                  } catch (e) {
                    if (navigator.vibrate) navigator.vibrate(40);
                  }
                }, delayMs);
              }
            }

            function scheduler() {
              if (!isRunning) return;
              const bpm = parseInt(bpmSlider.value);
              const interval = 60 / bpm;
              while (nextBeatTime < ctx.currentTime + 0.1) {
                beatCount++;
                const isStrong = (beatCount % 2 === 1);
                playClick(nextBeatTime, isStrong);
                nextBeatTime += interval;
              }
            }

            function toggle() {
              isRunning ? stop() : start();
            }

            function start() {
              if (isRunning) return;
              if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
              ctx.resume();
              isRunning = true;
              beatCount = 0;
              nextBeatTime = ctx.currentTime + 0.05;
              if (timer) clearInterval(timer);
              timer = setInterval(scheduler, 25);
              document.getElementById("start").style.opacity = "0.6";
            }

            function stop() {
              isRunning = false;
              if (timer) { clearInterval(timer); timer = null; }
              document.getElementById("start").style.opacity = "1";
            }

            document.getElementById("start").onclick = start;
            document.getElementById("stop").onclick = stop;
          });
          </script>
          </body>
          </html>
          EOF

      - name: Fix duplicate Kotlin dependencies
        run: |
          cd velometronome/android/app
          # Исключаем устаревшие модули Kotlin, которые конфликтуют с kotlin-stdlib
          sed -i '/apply plugin: .com.android.application./a\
          configurations {\
              all {\
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"\
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"\
              }\
          }' build.gradle

      - name: Sync Capacitor Android Project
        run: |
          cd velometronome
          npx cap sync android

      - name: Build Android APK
        run: |
          cd velometronome/android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VeloMetronome-APK
          path: velometronome/android/app/build/outputs/apk/debug/app-debug.apk

name: Build Metronome APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create metronome com.example.metronome Metronome
          cd metronome
          cordova platform add android
          cordova plugin add cordova-plugin-vibration

      - name: Setup App Icon
        run: |
          cd metronome
          mkdir -p res
          # Скачиваем векторную иконку велосипеда
          curl -L -o res/icon.svg https://raw.githubusercontent.com/twitter/twemoji/master/assets/svg/1f6b2.svg
          # Устанавливаем rsvg-convert для качественной растеризации SVG
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          # Конвертируем в PNG нужного размера
          rsvg-convert -w 512 -h 512 res/icon.svg -o res/icon.png
          # Внедряем иконку в config.xml
          sed -i 's|</widget>|    <icon src="res/icon.png" />\n</widget>|' config.xml

      - name: Write Application Source
        run: |
          cat << 'EOF' > metronome/www/index.html
          <!doctype html>
          <html>
          <head>
          <meta charset="utf-8">
          <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com 'unsafe-eval' 'unsafe-inline' blob:; media-src * data:; img-src 'self' data: content:;">
          <meta name="format-detection" content="telephone=no">
          <meta name="msapplication-tap-highlight" content="no">
          <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
          <title>Bike Cadence</title>
          <style>
          body { font-family: sans-serif; padding: 20px; background:#111; color:#eee; }
          button, input { font-size: 18px; margin: 12px 0; }
          input[type=range]{ width: 100%; }
          .checkbox-group { margin: 15px 0; font-size: 16px; }
          .checkbox-group label { display: block; margin-bottom: 10px; cursor: pointer; }
          </style>
          </head>
          <body>
          <h2>Cadence metronome</h2>
          <label>BPM: <span id="bpmVal">90</span></label><br>
          <input id="bpm" type="range" min="40" max="180" value="90">
          <br>
          
          <div class="checkbox-group">
            <label><input type="checkbox" id="vibStrong"> Вибро на сильную долю</label>
            <label><input type="checkbox" id="vibWeak" checked> Вибро на слабую долю</label>
          </div>

          <button id="start">Start</button>
          <button id="stop">Stop</button>

          <audio id="silentAudio" loop src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA" style="display:none;"></audio>

          <script src="cordova.js"></script>
          <script>
          const workerCode = `
              let timer = null;
              self.onmessage = function(e) {
                  if (e.data === 'start') {
                      timer = setInterval(() => postMessage('tick'), 25);
                  } else if (e.data === 'stop') {
                      clearInterval(timer);
                  }
              };
          `;
          const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
          const timerWorker = new Worker(URL.createObjectURL(workerBlob));

          document.addEventListener('deviceready', function() {
              let ctx;
              let isRunning = false;
              let beat = 0;
              let nextTime = 0;
              let lastVolumeClickTime = 0;

              const bpmSlider = document.getElementById("bpm");
              const bpmVal = document.getElementById("bpmVal");
              const silentAudio = document.getElementById("silentAudio");
              
              const vibStrongCb = document.getElementById("vibStrong");
              const vibWeakCb = document.getElementById("vibWeak");

              bpmSlider.oninput = () => bpmVal.textContent = bpmSlider.value;

              document.addEventListener('resume', () => {
                  if (ctx && ctx.state === 'suspended') {
                      ctx.resume();
                  }
              }, false);

              function noiseBuffer(ctx, duration=0.06) {
                  const rate = ctx.sampleRate;
                  const buffer = ctx.createBuffer(1, rate * duration, rate);
                  const data = buffer.getChannelData(0);
                  for (let i = 0; i < data.length; i++) {
                      data[i] = (Math.random()*2 - 1) * 0.8;
                  }
                  return buffer;
              }

              function playBeat(time, strong=false) {
                  const source = ctx.createBufferSource();
                  source.buffer = noiseBuffer(ctx, strong ? 0.09 : 0.06);

                  const filter = ctx.createBiquadFilter();
                  filter.type = "bandpass";
                  filter.frequency.value = strong ? 2200 : 1400;
                  filter.Q.value = 6;

                  const highShelf = ctx.createBiquadFilter();
                  highShelf.type = "highshelf";
                  highShelf.frequency.value = 2000;
                  highShelf.gain.value = strong ? 6 : 3;

                  const gain = ctx.createGain();
                  gain.gain.value = strong ? 1.6 : 0.9;

                  const comp = ctx.createDynamicsCompressor();
                  comp.threshold.value = -18;
                  comp.knee.value = 20;
                  comp.ratio.value = 6;
                  comp.attack.value = 0.003;
                  comp.release.value = 0.15;

                  source.connect(filter);
                  filter.connect(highShelf);
                  highShelf.connect(gain);
                  gain.connect(comp);
                  comp.connect(ctx.destination);

                  source.start(time);
              }

              function scheduler() {
                  const bpm = parseInt(bpmSlider.value);
                  const interval = 60 / bpm;

                  while (nextTime < ctx.currentTime + 0.1) {
                      beat++;
                      const strong = (beat % 2 === 1);
                      playBeat(nextTime, strong);

                      const shouldVibrate = (strong && vibStrongCb.checked) || (!strong && vibWeakCb.checked);

                      if (shouldVibrate) {
                          const delay = Math.max(0, (nextTime - ctx.currentTime) * 1000);
                          const vibDuration = strong ? 60 : 40;
                          
                          setTimeout(() => {
                              if (navigator.vibrate) navigator.vibrate(vibDuration);
                          }, delay);
                      }
                      
                      nextTime += interval;
                  }
              }

              timerWorker.onmessage = function(e) {
                  if (e.data === 'tick' && isRunning) {
                      scheduler();
                  }
              };

              function toggleMetronome() {
                  if (isRunning) stop();
                  else start();
              }

              function handleVolumeButton() {
                  const currentTime = new Date().getTime();
                  if (currentTime - lastVolumeClickTime < 500) {
                      toggleMetronome();
                      lastVolumeClickTime = 0;
                  } else {
                      lastVolumeClickTime = currentTime;
                  }
              }

              document.addEventListener("volumeupbutton", handleVolumeButton, false);
              document.addEventListener("volumedownbutton", handleVolumeButton, false);

              function start() {
                  if (isRunning) return;
                  
                  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
                  if (ctx.state === 'suspended') ctx.resume();

                  silentAudio.play().catch(e => console.log("Audio lock failed:", e));

                  isRunning = true;
                  beat = 0;
                  nextTime = ctx.currentTime + 0.05;
                  
                  timerWorker.postMessage('start');
              }

              function stop() {
                  isRunning = false;
                  timerWorker.postMessage('stop');
                  silentAudio.pause();
              }

              document.getElementById("start").onclick = start;
              document.getElementById("stop").onclick = stop;
          }, false);
          </script>
          </body>
          </html>
          EOF

      - name: Build Android APK
        run: |
          cd metronome
          cordova build android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Metronome-APK
          path: metronome/platforms/android/app/build/outputs/apk/debug/app-debug.apk

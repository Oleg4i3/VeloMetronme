name: Build Metronome APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create metronome com.example.metronome Metronome
          cd metronome
          
          cordova platform add android
          
          cordova plugin add cordova-plugin-vibration
          cordova plugin add cordova-plugin-background-mode
          
          # Используем edit-config вместо sed, чтобы избежать дублирования в AndroidManifest
          cat << 'EOF' > config.xml
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.example.metronome" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0" xmlns:android="http://schemas.android.com/apk/res/android">
              <name>Metronome</name>
              <content src="index.html" />
              <access origin="*" />
              <preference name="KeepRunning" value="true"/>
              <preference name="AndroidXEnabled" value="true"/>
              <platform name="android">
                  <edit-config file="app/src/main/AndroidManifest.xml" mode="merge" target="/manifest/application/service[@android:name='de.appplant.cordova.plugin.background.ForegroundService']">
                      <service android:foregroundServiceType="mediaPlayback" />
                  </edit-config>
                  <config-file target="AndroidManifest.xml" parent="/*">
                      <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
                      <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />
                      <uses-permission android:name="android.permission.WAKE_LOCK" />
                      <uses-permission android:name="android.permission.VIBRATE" />
                  </config-file>
              </platform>
          </widget>
          EOF

      - name: Write Application Source
        run: |
          cat << 'EOF' > metronome/www/index.html
          <!doctype html>
          <html>
          <head>
          <meta charset="utf-8">
          <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com 'unsafe-eval' 'unsafe-inline'; media-src *; img-src 'self' data: content:;">
          <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
          <title>Metronome</title>
          <style>
          body { font-family: sans-serif; padding: 20px; background:#111; color:#eee; text-align: center; }
          button { font-size: 24px; margin: 10px; padding: 15px; width: 80%; border-radius: 8px; border: none; background: #444; color: white; }
          #start { background: #282; }
          #stop { background: #822; }
          input[type=range]{ width: 100%; height: 50px; }
          #bpmVal { font-weight: bold; font-size: 3em; color: #0f0; display: block; margin: 10px; }
          </style>
          </head>
          <body>
          <h2>Metronome</h2>
          <span id="bpmVal">90</span>
          <input id="bpm" type="range" min="40" max="200" value="90">
          <button id="start">START</button>
          <button id="stop">STOP</button>
          
          <script src="cordova.js"></script>
          <script>
          document.addEventListener('deviceready', function() {
              let ctx;
              let isRunning = false;
              let beat = 0;
              let nextTime = 0;
              let lastVolTime = 0;

              if (window.cordova && cordova.plugins.backgroundMode) {
                  cordova.plugins.backgroundMode.enable();
                  cordova.plugins.backgroundMode.setDefaults({
                      title: 'Metronome',
                      text: 'Metronome is active',
                      resume: true,
                      hidden: false
                  });
              }

              function handleVol() {
                  const now = Date.now();
                  if (now - lastVolTime < 500) {
                      if (isRunning) stop(); else start();
                  }
                  lastVolTime = now;
              }
              document.addEventListener("volumeupbutton", handleVol, false);
              document.addEventListener("volumedownbutton", handleVol, false);

              const bpmSlider = document.getElementById("bpm");
              const bpmVal = document.getElementById("bpmVal");
              bpmSlider.oninput = () => { bpmVal.textContent = bpmSlider.value; };

              function playBeat(time, isStrong) {
                  const osc = ctx.createOscillator();
                  const gain = ctx.createGain();
                  osc.type = 'sine';
                  osc.frequency.setValueAtTime(isStrong ? 1000 : 600, time);
                  gain.gain.setValueAtTime(0.4, time);
                  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
                  osc.connect(gain);
                  gain.connect(ctx.destination);
                  osc.start(time);
                  osc.stop(time + 0.1);
              }

              function scheduler() {
                  if (!isRunning) return;
                  const interval = 60 / parseInt(bpmSlider.value);
                  while (nextTime < ctx.currentTime + 0.1) {
                      beat++;
                      const isStrong = (beat % 2 === 1);
                      playBeat(nextTime, isStrong);
                      if (!isStrong) {
                          const delay = (nextTime - ctx.currentTime) * 1000;
                          setTimeout(() => { if(navigator.vibrate) navigator.vibrate(40); }, Math.max(0, delay));
                      }
                      nextTime += interval;
                  }
                  setTimeout(scheduler, 25);
              }

              function start() {
                  if (isRunning) return;
                  ctx = new (window.AudioContext || window.webkitAudioContext)();
                  isRunning = true;
                  beat = 0;
                  nextTime = ctx.currentTime + 0.05;
                  scheduler();
              }

              function stop() {
                  isRunning = false;
                  if (ctx) ctx.close();
              }

              document.getElementById("start").onclick = start;
              document.getElementById("stop").onclick = stop;
          }, false);
          </script>
          </body>
          </html>
          EOF

      - name: Build Android APK
        run: |
          cd metronome
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Metronome-APK
          path: metronome/platforms/android/app/build/outputs/apk/debug/app-debug.apk

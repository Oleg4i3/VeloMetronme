name: Build Native Metronome APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Create Native Android Project
        run: |
          mkdir -p app/src/main/java/com/example/metronome
          mkdir -p app/src/main/res/mipmap
          
          # 1. Настройки проекта Gradle
          cat << 'EOF' > settings.gradle.kts
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "Metronome"
          include(":app")
          EOF

          # 2. Корневой build.gradle
          cat << 'EOF' > build.gradle.kts
          plugins {
              id("com.android.application") version "8.1.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.0" apply false
          }
          EOF

          # 3. Модульный build.gradle (без сторонних зависимостей, sdk 33)
          cat << 'EOF' > app/build.gradle.kts
          plugins { id("com.android.application"); id("org.jetbrains.kotlin.android") }
          android {
              namespace = "com.example.metronome"
              compileSdk = 33
              defaultConfig {
                  applicationId = "com.example.metronome"
                  minSdk = 26
                  targetSdk = 33
                  versionCode = 1
                  versionName = "1.0"
              }
              compileOptions { sourceCompatibility = JavaVersion.VERSION_17; targetCompatibility = JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = "17" }
          }
          EOF

          # 4. AndroidManifest (запрашиваем вибрацию и запрет сна)
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <application android:label="Bike Cadence" android:icon="@mipmap/ic_launcher" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. MainActivity.kt (Вся логика и UI в одном файле)
          cat << 'EOF' > app/src/main/java/com/example/metronome/MainActivity.kt
          package com.example.metronome

          import android.app.Activity
          import android.media.AudioAttributes
          import android.media.AudioManager
          import android.media.ToneGenerator
          import android.os.Bundle
          import android.os.VibrationEffect
          import android.os.Vibrator
          import android.view.KeyEvent
          import android.view.WindowManager
          import android.widget.*
          import android.graphics.Color
          import android.view.Gravity
          import kotlin.concurrent.thread

          class MainActivity : Activity() {
              private var isRunning = false
              private var bpm = 90
              private var beat = 0
              private lateinit var vibrator: Vibrator
              private lateinit var toneGen: ToneGenerator
              private var lastVolumeClickTime = 0L

              private lateinit var startStopBtn: Button
              private lateinit var vibStrongCb: CheckBox
              private lateinit var vibWeakCb: CheckBox

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  window.addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON)

                  vibrator = getSystemService(VIBRATOR_SERVICE) as Vibrator
                  toneGen = ToneGenerator(AudioManager.STREAM_ALARM, 100)

                  val layout = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      setPadding(60, 100, 60, 60)
                      setBackgroundColor(Color.parseColor("#111111"))
                  }

                  val titleText = TextView(this).apply {
                      text = "Cadence Metronome"
                      textSize = 28f
                      setTextColor(Color.WHITE)
                      gravity = Gravity.CENTER
                      setPadding(0, 0, 0, 80)
                  }

                  val bpmText = TextView(this).apply {
                      text = "BPM: 90"
                      textSize = 24f
                      setTextColor(Color.parseColor("#EEEEEE"))
                      setPadding(0, 0, 0, 20)
                  }

                  val bpmSlider = SeekBar(this).apply {
                      max = 140 
                      progress = 50
                      setPadding(0, 0, 0, 80)
                  }
                  
                  bpmSlider.setOnSeekBarChangeListener(object : SeekBar.OnSeekBarChangeListener {
                      override fun onProgressChanged(seekBar: SeekBar?, progress: Int, fromUser: Boolean) {
                          bpm = progress + 40
                          bpmText.text = "BPM: $bpm"
                      }
                      override fun onStartTrackingTouch(seekBar: SeekBar?) {}
                      override fun onStopTrackingTouch(seekBar: SeekBar?) {}
                  })

                  vibStrongCb = CheckBox(this).apply {
                      text = "Вибро на сильную долю"
                      setTextColor(Color.WHITE)
                      textSize = 18f
                      setPadding(0, 0, 0, 30)
                  }

                  vibWeakCb = CheckBox(this).apply {
                      text = "Вибро на слабую долю"
                      setTextColor(Color.WHITE)
                      textSize = 18f
                      isChecked = true
                      setPadding(0, 0, 0, 80)
                  }
                  
                  startStopBtn = Button(this).apply {
                      text = "START"
                      textSize = 24f
                      setBackgroundColor(Color.parseColor("#444444"))
                      setTextColor(Color.WHITE)
                      setPadding(0, 40, 0, 40)
                  }

                  startStopBtn.setOnClickListener { toggleMetronome() }

                  layout.addView(titleText)
                  layout.addView(bpmText)
                  layout.addView(bpmSlider)
                  layout.addView(vibStrongCb)
                  layout.addView(vibWeakCb)
                  layout.addView(startStopBtn)

                  setContentView(layout)
              }

              private fun toggleMetronome() {
                  if (isRunning) {
                      isRunning = false
                      startStopBtn.text = "START"
                      startStopBtn.setBackgroundColor(Color.parseColor("#444444"))
                  } else {
                      isRunning = true
                      startStopBtn.text = "STOP"
                      startStopBtn.setBackgroundColor(Color.parseColor("#882222"))
                      beat = 0
                      
                      thread {
                          var nextTime = System.currentTimeMillis()
                          while (isRunning) {
                              val intervalMs = 60000 / bpm
                              beat++
                              val isStrong = beat % 2 == 1
                              
                              toneGen.startTone(if (isStrong) ToneGenerator.TONE_CDMA_ABBR_ALERT else ToneGenerator.TONE_CDMA_SOFT_ERROR_LITE, 40)

                              val shouldVibrate = (isStrong && vibStrongCb.isChecked) || (!isStrong && vibWeakCb.isChecked)
                              if (shouldVibrate) {
                                  val duration = if (isStrong) 60L else 40L
                                  val effect = VibrationEffect.createOneShot(duration, VibrationEffect.DEFAULT_AMPLITUDE)
                                  val attr = AudioAttributes.Builder()
                                      .setUsage(AudioAttributes.USAGE_ALARM)
                                      .setContentType(AudioAttributes.CONTENT_TYPE_SONIFICATION)
                                      .build()
                                  vibrator.vibrate(effect, attr)
                              }

                              nextTime += intervalMs
                              val sleepTime = nextTime - System.currentTimeMillis()
                              if (sleepTime > 0) {
                                  Thread.sleep(sleepTime)
                              } else {
                                  nextTime = System.currentTimeMillis()
                              }
                          }
                      }
                  }
              }

              override fun onKeyDown(keyCode: Int, event: KeyEvent?): Boolean {
                  if (keyCode == KeyEvent.KEYCODE_VOLUME_UP || keyCode == KeyEvent.KEYCODE_VOLUME_DOWN) {
                      if (event?.repeatCount == 0) {
                          val currentTime = System.currentTimeMillis()
                          if (currentTime - lastVolumeClickTime < 500) {
                              runOnUiThread { toggleMetronome() }
                              lastVolumeClickTime = 0
                          } else {
                              lastVolumeClickTime = currentTime
                          }
                      }
                      return false
                  }
                  return super.onKeyDown(keyCode, event)
              }
              
              override fun onDestroy() {
                  super.onDestroy()
                  isRunning = false
                  toneGen.release()
              }
          }
          EOF
          
          # 6. Скачиваем SVG во временную папку, а в ресурсы кладем только PNG!
          curl -sL -o /tmp/ic_launcher.svg https://raw.githubusercontent.com/twitter/twemoji/master/assets/svg/1f6b2.svg
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 192 -h 192 /tmp/ic_launcher.svg -o app/src/main/res/mipmap/ic_launcher.png
          
      - name: Build Native APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Native-Metronome-APK
          path: app/build/outputs/apk/debug/app-debug.apk

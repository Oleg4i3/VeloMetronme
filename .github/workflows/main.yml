name: Build VeloMetronome Native APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Generate project structure
        run: |
          mkdir -p app/src/main/java/com/velo/metronome
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

      # ---------- Gradle wrapper ----------
      - name: Write gradle-wrapper.properties
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Download gradlew and wrapper jar
        run: |
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew -O gradlew
          chmod +x gradlew
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar

      # ---------- settings.gradle с репозиториями плагинов ----------
      - name: Write settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "VeloMetronome"
          include ':app'
          EOF

      - name: Write root build.gradle
        run: |
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

      - name: Write app/build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.velo.metronome'
              compileSdk 34
              defaultConfig {
                  applicationId "com.velo.metronome"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  debug { debuggable true }
              }
          }
          EOF

      # ---------- Android Manifest ----------
      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.VIBRATE" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="VeloMetronome"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      # ---------- Ресурсы ----------
      - name: Write strings.xml
        run: |
          echo '<resources><string name="app_name">VeloMetronome</string></resources>' > app/src/main/res/values/strings.xml

      # ---------- Главный Java-файл (без изменений, работает) ----------
      - name: Write MainActivity.java
        run: |
          cat > app/src/main/java/com/velo/metronome/MainActivity.java << 'JAVAEOF'
          package com.velo.metronome;

          import android.app.Activity;
          import android.content.Context;
          import android.media.AudioAttributes;
          import android.media.AudioFormat;
          import android.media.AudioTrack;
          import android.os.Bundle;
          import android.os.VibrationEffect;
          import android.os.Vibrator;
          import android.view.KeyEvent;
          import android.view.View;
          import android.view.WindowManager;
          import android.widget.*;

          public class MainActivity extends Activity {
              private Vibrator vibrator;
              private AudioTrack audioTrack;
              private Thread metronomeThread;
              private volatile boolean running = false;
              private int bpm = 90;
              private boolean vibrateWeak = true, vibrateStrong = true;

              private TextView tvBpm;
              private SeekBar seekBar;
              private CheckBox cbWeak, cbStrong;
              private Button btnStart, btnStop;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  vibrator = (Vibrator) getSystemService(Context.VIBRATOR_SERVICE);

                  LinearLayout layout = new LinearLayout(this);
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setPadding(40, 40, 40, 40);
                  layout.setBackgroundColor(0xFF121212);

                  TextView title = new TextView(this);
                  title.setText("⏱ VeloMetronome");
                  title.setTextColor(0xFFFF6B6B);
                  title.setTextSize(24);
                  layout.addView(title);

                  tvBpm = new TextView(this);
                  tvBpm.setText("90");
                  tvBpm.setTextColor(0xFFFF6B6B);
                  tvBpm.setTextSize(64);
                  layout.addView(tvBpm);

                  seekBar = new SeekBar(this);
                  seekBar.setMax(180);
                  seekBar.setMin(40);
                  seekBar.setProgress(bpm);
                  seekBar.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      public void onProgressChanged(SeekBar sb, int val, boolean fromUser) {
                          bpm = val;
                          tvBpm.setText(String.valueOf(val));
                      }
                      public void onStartTrackingTouch(SeekBar sb) {}
                      public void onStopTrackingTouch(SeekBar sb) {}
                  });
                  layout.addView(seekBar);

                  LinearLayout checks = new LinearLayout(this);
                  cbWeak = new CheckBox(this);
                  cbWeak.setText("Слабая вибрация");
                  cbWeak.setTextColor(0xFFAAAAAA);
                  cbWeak.setChecked(true);
                  cbStrong = new CheckBox(this);
                  cbStrong.setText("Сильная вибрация");
                  cbStrong.setTextColor(0xFFAAAAAA);
                  cbStrong.setChecked(true);
                  checks.addView(cbWeak);
                  checks.addView(cbStrong);
                  layout.addView(checks);

                  btnStart = new Button(this);
                  btnStart.setText("▶ СТАРТ");
                  btnStart.setBackgroundColor(0xFF2ECC71);
                  btnStart.setOnClickListener(v -> startMetronome());
                  layout.addView(btnStart);

                  btnStop = new Button(this);
                  btnStop.setText("■ СТОП");
                  btnStop.setBackgroundColor(0xFFE74C3C);
                  btnStop.setOnClickListener(v -> stopMetronome());
                  layout.addView(btnStop);

                  setContentView(layout);
              }

              @Override
              public boolean dispatchKeyEvent(KeyEvent event) {
                  int code = event.getKeyCode();
                  if ((code == KeyEvent.KEYCODE_VOLUME_UP || code == KeyEvent.KEYCODE_VOLUME_DOWN)
                          && event.getAction() == KeyEvent.ACTION_DOWN) {
                      if (running) stopMetronome();
                      else startMetronome();
                      return true;
                  }
                  return super.dispatchKeyEvent(event);
              }

              private void startMetronome() {
                  if (running) return;
                  running = true;
                  btnStart.setEnabled(false);
                  int sampleRate = 44100;
                  int minBuf = AudioTrack.getMinBufferSize(sampleRate,
                          AudioFormat.CHANNEL_OUT_MONO, AudioFormat.ENCODING_PCM_16BIT);
                  audioTrack = new AudioTrack.Builder()
                          .setAudioAttributes(new AudioAttributes.Builder()
                                  .setUsage(AudioAttributes.USAGE_MEDIA)
                                  .setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)
                                  .build())
                          .setAudioFormat(new AudioFormat.Builder()
                                  .setEncoding(AudioFormat.ENCODING_PCM_16BIT)
                                  .setSampleRate(sampleRate)
                                  .setChannelMask(AudioFormat.CHANNEL_OUT_MONO)
                                  .build())
                          .setBufferSizeInBytes(minBuf)
                          .build();
                  audioTrack.play();

                  metronomeThread = new Thread(() -> {
                      int beatCount = 0;
                      long intervalMs = 60000 / bpm;
                      while (running) {
                          boolean strong = (beatCount % 2 == 0);
                          // короткий шум
                          byte[] buffer = generateClick(strong, sampleRate);
                          audioTrack.write(buffer, 0, buffer.length);

                          if (strong && vibrateStrong || !strong && vibrateWeak) {
                              runOnUiThread(() -> {
                                  if (vibrator.hasVibrator()) {
                                      if (android.os.Build.VERSION.SDK_INT >= 26)
                                          vibrator.vibrate(VibrationEffect.createOneShot(50, VibrationEffect.DEFAULT_AMPLITUDE));
                                      else vibrator.vibrate(50);
                                  }
                              });
                          }
                          beatCount++;
                          long remain = intervalMs;
                          while (remain > 0 && running) {
                              try { Thread.sleep(Math.min(remain, 20)); }
                              catch (InterruptedException e) { break; }
                              remain -= 20;
                          }
                      }
                  });
                  metronomeThread.start();
              }

              private void stopMetronome() {
                  running = false;
                  if (metronomeThread != null) metronomeThread.interrupt();
                  if (audioTrack != null) {
                      audioTrack.stop();
                      audioTrack.release();
                      audioTrack = null;
                  }
                  btnStart.setEnabled(true);
              }

              private byte[] generateClick(boolean strong, int sampleRate) {
                  int durationMs = strong ? 40 : 25;
                  int samples = sampleRate * durationMs / 1000;
                  byte[] buf = new byte[samples * 2];
                  for (int i = 0; i < samples; i++) {
                      short val = (short)((Math.random() * 0.8 - 0.4) * Short.MAX_VALUE);
                      buf[i*2] = (byte)(val & 0xff);
                      buf[i*2+1] = (byte)((val >> 8) & 0xff);
                  }
                  return buf;
              }

              @Override
              protected void onDestroy() {
                  stopMetronome();
                  super.onDestroy();
              }
          }
          JAVAEOF

      # ---------- Сборка ----------
      - name: Build APK
        run: |
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VeloMetronome-APK
          path: app/build/outputs/apk/debug/app-debug.apk
